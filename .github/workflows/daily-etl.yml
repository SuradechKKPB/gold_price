name: compute-signals

# GTA blocks GitHub's datacenter IPs (403), so the live price fetch runs on the
# phone (joe-health phone_sync.py) and writes to Supabase. This job is COMPUTE-ONLY:
# it recomputes the sell-pressure score from the prices already in Supabase — no GTA
# call — so it runs reliably on GitHub and keeps the dashboard score fresh.
# Runs every 6h to pick up the phone's daily price write.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Recompute signals from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python -m etl.compute
